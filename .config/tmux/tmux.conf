# ==========================
# Core Settings
# ==========================
# Set Prefix to Ctrl+f
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# CRUCIAL FOR NEOVIM: Remove escape delay
set -s escape-time 0

# Show status messages for 3 seconds (default is 750ms)
set -g display-time 3000

# Enable True Color and 256 colors for beautiful Nvim themes
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable Mouse support
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 50000

# 1-based indexing for easier reaching
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Enable focus events for Neovim's 'autoread'
set-option -g focus-events on

# ==========================
# Keybindings
# ==========================
# Easy config reload (Prefix + r)
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux config reloaded!"

# Better Splitting (Visual and intuitive)
unbind '"'
unbind %
# Prefix + | for vertical split
bind | split-window -h -c "#{pane_current_path}"
# Prefix + - for horizontal split
bind - split-window -v -c "#{pane_current_path}"
# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# Resizing panes (Prefix + Shift + hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Maximize pane (Prefix + m instead of Prefix + z, personal preference for "maximize")
bind -r m resize-pane -Z

# ==========================
# Vi Copy Mode
# ==========================
set-window-option -g mode-keys vi

# Enter "Navigation / Copy Mode" with Prefix + Escape (Default is Prefix + [)
bind Escape copy-mode

# Enter "Visual Mode" with just 'v' (Once in copy mode)
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# Enter "Visual Line Mode" with 'V' (Shift + v)
bind-key -T copy-mode-vi 'V' send-keys -X select-line

# Exit copy mode with Escape (default only clears selection, doesn't exit)
bind-key -T copy-mode-vi 'Escape' send-keys -X cancel

# Prefix + p to paste from the system clipboard
bind p run-shell 'printf "%s" "$(xclip -o -selection clipboard)" | tmux load-buffer - ; tmux paste-buffer'

# ==========================
# UI & Status Bar (Clean & Minimal)
# ==========================
# Move the status bar to the top of the terminal
set-option -g status-position top

# Base status bar colors (transparent background, default text)
set -g status-style bg=default,fg="#c0caf5"

# Left side: Session name (Tokyo Night Blue)
set -g status-left-length 50
set -g status-left "#[fg=#7aa2f7,bold] ❐ #S #[default]  "

# Right side: Time (Tokyo Night Muted Grey)
set -g status-right "#[fg=#565f89]%H:%M #[default] "

# Inactive Window: Muted grey text
set -g window-status-format "#[fg=#565f89] #I:#W "

# Active Window: Tokyo Night Purple (Bold) - No asterisk!
set -g window-status-current-format "#[fg=#e0af68,bold] #I:#W "

# ==========================
# Plugins
# ==========================

# Explicitly set the TPM path so plugins install in your .config folder
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'

# Seamless Nvim/Tmux navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Persistance across restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Save environment continuously
set -g @plugin 'tmux-plugins/tmux-continuum'

# Copy/Paste
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy'

# Whichkey
set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TPM (Keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
