# ==========================
# Core Settings
# ==========================
# Set Prefix to Ctrl+f
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# CRUCIAL FOR NEOVIM: Remove escape delay
set -s escape-time 0

# Enable True Color and 256 colors for beautiful Nvim themes
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable Mouse support
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 50000

# 1-based indexing for easier reaching
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==========================
# Keybindings
# ==========================
# Easy config reload (Prefix + r)
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux config reloaded!"

# Better Splitting (Visual and intuitive)
unbind '"'
unbind %
# Prefix + | for vertical split
bind | split-window -h -c "#{pane_current_path}"
# Prefix + - for horizontal split
bind - split-window -v -c "#{pane_current_path}"
# Open new windows in the current directory
bind c new-window -c "#{pane_current_path}"

# Resizing panes (Prefix + Shift + hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Maximize pane (Prefix + m instead of Prefix + z, personal preference for "maximize")
bind -r m resize-pane -Z

# ==========================
# Vi Copy Mode
# ==========================
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'xclip -sel clip -i'
# Prefix + p to paste
bind p run-shell 'printf "%s" "$(xclip -o -selection clipboard)" | tmux load-buffer - ; tmux paste-buffer'

# ==========================
# UI & Status Bar (Clean & Minimal)
# ==========================
set -g status-style bg=default,fg=white
set -g status-left-length 50
set -g status-left "#[fg=green,bold] ❐ #S #[default]  "
set -g status-right "#[fg=blue,bold]%H:%M #[default] "
set -g window-status-format "#[fg=gray] #I:#W "
set -g window-status-current-format "#[fg=green,bold] #I:#W*"

# ==========================
# Plugins
# ==========================

# Explicitly set the TPM path so plugins install in your .config folder
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'

# Seamless Nvim/Tmux navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM (Keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
